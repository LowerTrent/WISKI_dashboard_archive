name: Scheduled R Report

on:
  schedule:
    # Runs every day at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  render-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/R/library
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.Rmd') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install CRAN packages
        run: |
          Rscript -e "options(repos='https://cloud.r-project.org')"
          Rscript -e "install.packages(c(
            'rmarkdown',
            'knitr',
            'flexdashboard',
            'ggplot2',
            'plotly',
            'plyr',
            'kableExtra',
            'gert',
            'shiny',
            'leaflet'
          ))"

      - name: Clone WISKIr
        run: |
          git clone https://github.com/CentreForHydrology/WISKIr.git

      - name: Install WISKIr
        run: |
          R CMD INSTALL WISKIr/WISKIr

      - name: Render dashboard
        run: |
          Rscript -e "rmarkdown::render('LTC_Dashboard.Rmd', output_file='index.html')"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
