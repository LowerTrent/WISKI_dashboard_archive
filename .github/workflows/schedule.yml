name: Scheduled R Report

on:
  schedule:
    # Runs everyday at 09:00 UTC (Change this using cron syntax)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to also trigger it manually with a button

jobs:
  render-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install packages
        run: |
          Rscript -e "install.packages(c('rmarkdown', 'knitr'))"

      - name: Render R Markdown to HTML
        run: |
          Rscript -e "rmarkdown::render('LTC_Dashboard.Rmd', output_file = 'index.html')"

      - name: Deploy HTML to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Deploys the index.html from the root folder
          branch: gh-pages # Deploys to a dedicated branch
